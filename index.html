<!doctype html>
<html lang="en">
  <head>
    <title>Unit Converter</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Global CSS-->
    <link rel="stylesheet" href="./src/css/index.css" />

    <!--Blocks-->
    <link rel="stylesheet" href="./src/css/blocks/header/header.css" />
    <link rel="stylesheet" href="./src/css/blocks/form/form.css" />
    <link rel="stylesheet" href="./src/css/blocks/input/input.css" />
    <link rel="stylesheet" href="./src/css/blocks/button/button.css" />
    <link rel="stylesheet" href="./src/css/blocks/results/results.css" />
    <link rel="stylesheet" href="./src/css/blocks/result/result.css" />
  </head>

  <body>
    <main id="unit-converter">
      <header class="header">
        <h1 class="header__title">Metric/Imperial Unit Conversion</h1>
        <form class="form" data-form>
          <label for="number-input" class="form__label">Value to convert</label>
          <input
            id="number-input"
            type="number"
            name="value"
            value="20"
            class="form__input input"
            min="0"
            max="999"
          />
          <button class="button" type="submit">Convert</button>
        </form>
      </header>

      <section class="results" aria-labelledby="results-title">
        <h2 class="results__title" id="results-title">Results</h2>

        <ul class="results__list">
          <li class="result">
            <h3 class="result__title">Length (Meter/Feet)</h3>
            <p class="result__value" data-length>
              20 meters = 65.616 feet | 20 feet = 6.096 meters
            </p>
          </li>
          <li class="result">
            <h3 class="result__title">Volume (Liters/Gallons)</h3>
            <p class="result__value" data-volume>
              20 liters = 5.284 gallons | 20 gallons = 75.708 liters
            </p>
          </li>
          <li class="result">
            <h3 class="result__title">Mass (Kilograms/Pounds)</h3>
            <p class="result__value" data-mass>
              20 kilos = 44.092 pounds | 20 pounds = 9.072 kilos
            </p>
          </li>
        </ul>
      </section>
    </main>

    <script src="./dist/js/index.js" type="module"></script>
  </body>
</html>
